name: CI

# 触发条件：推送到 main/develop 分支，或向这两个分支发起 PR
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─────────────────────────────────────────
  # Job 1: 后端构建 + 单元测试
  # ─────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # 缓存 Maven 依赖，加快后续构建速度

      # 3. 编译 + 跑测试 + 生成 JaCoCo 报告
      - name: Build and Test
        run: mvn clean verify --no-transfer-progress
        # verify 阶段会依次执行：compile → test → jacoco:check（70% 门禁）

      # 4. 上传 JaCoCo 覆盖率报告（在 GitHub Actions 页面可以下载查看）
      - name: Upload JaCoCo Report
        if: always()            # 即使测试失败也上传，方便排查
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 2: 前端构建
  # ─────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 Node.js 18
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 安装 pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 缓存 pnpm 依赖
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # 安装依赖并构建
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
