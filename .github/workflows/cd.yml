name: CD

# 触发条件：推送 v* 格式的 tag，例如 v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 构建 JAR（跳过测试，测试在 CI 阶段已通过）
      - name: Build JAR
        run: mvn clean package -DskipTests --no-transfer-progress

      # 登录 Docker Hub（需要在 GitHub 仓库 Settings → Secrets 中配置）
      # DOCKERHUB_USERNAME: 你的 Docker Hub 用户名
      # DOCKERHUB_TOKEN:    你的 Docker Hub Access Token
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 提取版本号（从 tag 名称，如 v1.0.0 → 1.0.0）
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/smartpai:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/smartpai:latest
