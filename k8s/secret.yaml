# ============================================
# KnowFlow 项目 Kubernetes Secret 配置
# ============================================
# Secret 用于存储敏感信息，如密码、API 密钥、JWT 密钥等
# 
# 重要安全提示：
# 1. 本文件中的值都是 BASE64 编码的占位符，部署前必须替换为真实值
# 2. 生产环境建议使用外部密钥管理系统（如 Vault、AWS Secrets Manager）
# 3. 不要将包含真实密钥的此文件提交到 Git 仓库
# 
# 生成 BASE64 编码命令：
# echo -n 'your-secret-value' | base64

apiVersion: v1
kind: Secret
metadata:
  # Secret 名称
  name: knowflow-secret
  # 所属命名空间
  namespace: knowflow
  labels:
    app: knowflow
    component: secret
type: Opaque
stringData:
  # ============================================
  # 数据库密码 (MySQL)
  # ============================================
  # 原始值：PaiSmart2025
  # echo -n 'PaiSmart2025' | base64
  SPRING_DATASOURCE_PASSWORD: "UGFpU21hcnQyMDI1"
  
  # ============================================
  # Redis 密码
  # ============================================
  # 原始值：PaiSmart2025
  # echo -n 'PaiSmart2025' | base64
  SPRING_DATA_REDIS_PASSWORD: "UGFpU21hcnQyMDI1"
  
  # ============================================
  # MinIO 密钥
  # ============================================
  # 原始值：PaiSmart2025
  # echo -n 'PaiSmart2025' | base64
  MINIO_SECRET_KEY: "UGFpU21hcnQyMDI1"
  
  # ============================================
  # Elasticsearch 密码
  # ============================================
  # 原始值：PaiSmart2025
  # echo -n 'PaiSmart2025' | base64
  ELASTICSEARCH_PASSWORD: "UGFpU21hcnQyMDI1"
  
  # ============================================
  # JWT 密钥（用于 Token 签名）
  # ============================================
  # 原始值：PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc=
  # echo -n 'PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc=' | base64
  JWT_SECRET_KEY: "UFhyUWJ1Q3dYd09aemtNTC9WbTJTNXJTd3QxaXlidm1LdEdEelZFdStIYz0="
  
  # ============================================
  # 管理员初始密码
  # ============================================
  # 原始值：admin123
  # echo -n 'admin123' | base64
  ADMIN_PASSWORD: "YWRtaW4xMjM="
  
  # ============================================
  # DeepSeek API 密钥
  # ============================================
  # 原始值：sk-c71a24d763024b578ccbccc4c46ac404
  # echo -n 'sk-c71a24d763024b578ccbccc4c46ac404' | base64
  DEEPSEEK_API_KEY: "c2MtYzcxYTI0ZDc2MzAyNGI1NzhjY2JjY2M0YzQ2YWM0MDQ="
  
  # ============================================
  # Embedding API 密钥（豆包/DashScope）
  # ============================================
  # 原始值：sk-4972543ce3c448d18f916efe08fcc70a
  # echo -n 'sk-4972543ce3c448d18f916efe08fcc70a' | base64
  EMBEDDING_API_KEY: "c2stNDk3MjU0M2NlM2M0NDhkMThmOTE2ZWZlMDhmY2M3MGE="

---
# ============================================
# TLS Secret 示例（用于 Ingress HTTPS）
# ============================================
# 如需启用 HTTPS，请取消注释并配置 TLS 证书
# 
# apiVersion: v1
# kind: Secret
# metadata:
#   name: knowflow-tls
#   namespace: knowflow
# type: kubernetes.io/tls
# data:
#   # TLS 证书（base64 编码）
#   tls.crt: |
#     LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...
#   # TLS 私钥（base64 编码）
#   tls.key: |
#     LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...
